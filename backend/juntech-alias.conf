# ============================================================
# Apache Alias cho JunTech API — KHÔNG cần copy vào htdocs.
# Trỏ thẳng /juntech-api tới thư mục public của dự án.
#
# CÁCH DÙNG:
# 1. Mở: C:\xampp\apache\conf\extra\httpd-xampp.conf
# 2. Dán toàn bộ nội dung dưới vào CUỐI file đó.
# 3. XAMPP Control Panel -> Apache -> Stop rồi Start lại.
# 4. Test: http://localhost/juntech-api/api  (phải trả JSON service info)
# ============================================================

Alias /juntech-api "D:/TOOL CỜ BẠC/web-thiep/backend/public"

<Directory "D:/TOOL CỜ BẠC/web-thiep/backend/public">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>
